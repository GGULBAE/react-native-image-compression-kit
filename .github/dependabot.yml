version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      security-tooling:
        applies-to: "security-updates"
        patterns:
          - "vite"
          - "esbuild"
          - "lighthouse"
          - "@sentry/*"
          - "@opentelemetry/*"
        dependency-type: "development"
      development-minor-and-patch:
        applies-to: "version-updates"
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "bundler"
    directory: "/example"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
  - package-ecosystem: "gradle"
    directory: "/example/android"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
