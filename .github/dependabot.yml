version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      development-dependencies:
        dependency-type: "development"
  - package-ecosystem: "bundler"
    directory: "/example"
    schedule:
      interval: "monthly"
  - package-ecosystem: "gradle"
    directory: "/example/android"
    schedule:
      interval: "monthly"
