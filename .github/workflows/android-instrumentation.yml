name: Android Instrumentation

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-instrumentation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  heic-heif:
    name: HEIC/HEIF/AVIF emulator validation
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"
          yes | sdkmanager --licenses >/dev/null

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Android codegen artifacts
        run: pnpm example:codegen

      - name: Run HEIC/HEIF/AVIF instrumentation tests
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 1200
          disable-animations: true
          script: |
            set +e
            pnpm example:android-instrumentation
            instrumentation_status=$?
            adb logcat -d -s RNICK_AVIF_OUTPUT_SMOKE:I '*:S' || true
            exit $instrumentation_status
