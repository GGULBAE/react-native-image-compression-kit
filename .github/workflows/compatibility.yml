name: Compatibility

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/compatibility.yml"
      - "android/**"
      - "docs/compatibility-matrix.json"
      - "ios/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "react-native-image-compression-kit.podspec"
      - "scripts/compatibility-*.mjs"
      - "src/**"
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

concurrency:
  group: compatibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  consumer:
    name: Compatibility / ${{ matrix.lane }} / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: rn-floor-legacy
            platform: android
            os: ubuntu-latest
            node: "18"
          - lane: rn-floor-legacy
            platform: ios
            os: macos-latest
            node: "18"
          - lane: rn-current-legacy
            platform: android
            os: ubuntu-latest
            node: "24"
          - lane: rn-current-legacy
            platform: ios
            os: macos-latest
            node: "24"
          - lane: rn-current-new
            platform: android
            os: ubuntu-latest
            node: "24"
          - lane: rn-current-new
            platform: ios
            os: macos-latest
            node: "24"
          - lane: expo-current-new
            platform: android
            os: ubuntu-latest
            node: "24"
          - lane: expo-current-new
            platform: ios
            os: macos-latest
            node: "24"

    steps:
      - name: Checkout exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Install Android SDK components
        if: matrix.platform == 'android'
        run: |
          yes | sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"
          yes | sdkmanager --licenses >/dev/null

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.7.0

      - name: Setup repository Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Gradle
        if: matrix.platform == 'android'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Install repository dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify exact compatibility matrix
        run: pnpm fixtures:compatibility:check

      - name: Build one candidate tarball
        id: package
        shell: bash
        run: |
          pnpm build
          mkdir -p "$RUNNER_TEMP/rnick-package"
          pnpm pack --pack-destination "$RUNNER_TEMP/rnick-package"
          tgz="$(find "$RUNNER_TEMP/rnick-package" -maxdepth 1 -name '*.tgz' -print -quit)"
          test -n "$tgz"
          echo "tgz=$tgz" >> "$GITHUB_OUTPUT"

      - name: Setup consumer Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node }}

      - name: Build fresh packed consumer
        run: >-
          node scripts/compatibility-consumer.mjs
          --lane "${{ matrix.lane }}"
          --platform "${{ matrix.platform }}"
          --tgz "${{ steps.package.outputs.tgz }}"
