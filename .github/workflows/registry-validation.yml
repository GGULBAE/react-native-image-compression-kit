name: Registry Validation

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact published npm version to validate
        required: true
        default: "0.2.50"
        type: string
      expected_tag:
        description: Dist-tag that must resolve to the same version
        required: true
        default: latest
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  registry-provenance:
    name: npm registry provenance
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate registry package and build provenance bundle
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          rm -rf registry-validation registry-stdout.json registry-verification.json registry-verification-stdout.json
          set -o pipefail
          pnpm smoke:registry -- \
            --version "${{ inputs.version }}" \
            --expect-tag "${{ inputs.expected_tag }}" \
            --json \
            --artifact-dir registry-validation \
            | tee registry-stdout.json
          cmp registry-stdout.json registry-validation/stdout.json
          pnpm verify:registry-provenance -- \
            --artifact-dir registry-validation \
            --expect-package react-native-image-compression-kit \
            --expect-version "${{ inputs.version }}" \
            --expect-tag "${{ inputs.expected_tag }}" \
            --json \
            --report-file registry-verification.json \
            | tee registry-verification-stdout.json
          cmp registry-verification.json registry-verification-stdout.json
          rm registry-stdout.json registry-verification-stdout.json

      - name: Attest canonical bundle manifest
        id: attest
        if: steps.validate.outcome == 'success'
        continue-on-error: true
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: registry-validation/bundle-manifest.json

      - name: Verify and package attestation trust material
        id: verify_attestation
        if: steps.validate.outcome == 'success' && steps.attest.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
          EXPECTED_WORKFLOW: ${{ github.repository }}/.github/workflows/registry-validation.yml
          EXPECTED_REF: ${{ github.ref }}
          EXPECTED_HEAD_SHA: ${{ github.sha }}
        run: |
          rm -rf registry-attestation registry-attestation-download
          rm -f registry-attestation-online.json registry-attestation-verification-stdout.json
          mkdir -p registry-attestation registry-attestation-download

          policy=(
            --repo "$EXPECTED_REPOSITORY"
            --signer-workflow "$EXPECTED_WORKFLOW"
            --source-ref "$EXPECTED_REF"
            --source-digest "$EXPECTED_HEAD_SHA"
            --cert-oidc-issuer https://token.actions.githubusercontent.com
            --predicate-type https://slsa.dev/provenance/v1
            --deny-self-hosted-runners
          )
          gh attestation verify \
            registry-validation/bundle-manifest.json \
            "${policy[@]}" \
            --format json \
            > registry-attestation-online.json
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          const results = JSON.parse(readFileSync('registry-attestation-online.json', 'utf8'));
          if (!Array.isArray(results) || results.length === 0) {
            throw new Error('Online attestation verification returned no results.');
          }
          NODE

          (
            cd registry-attestation-download
            gh attestation download \
              ../registry-validation/bundle-manifest.json \
              --repo "$EXPECTED_REPOSITORY"
          )
          mapfile -t downloaded_bundles < <(
            find registry-attestation-download -maxdepth 1 -type f -name 'sha256*.jsonl' -print
          )
          if [[ "${#downloaded_bundles[@]}" -ne 1 ]]; then
            echo "Expected exactly one downloaded attestation JSONL, found ${#downloaded_bundles[@]}." >&2
            exit 1
          fi
          mv "${downloaded_bundles[0]}" registry-attestation/attestation.jsonl

          gh attestation trusted-root > registry-attestation/trusted-root.jsonl
          trusted_root_sha256=$(sha256sum registry-attestation/trusted-root.jsonl | cut -d ' ' -f 1)
          if [[ "$trusted_root_sha256" != "65ca537f6ed8a47fd0e560c421baa1f6c1efb8b25fc200d8c5c02c0e92eb2b9c" ]]; then
            echo "Unexpected GitHub trusted root SHA-256: $trusted_root_sha256" >&2
            exit 1
          fi

          pnpm verify:registry-attestation -- \
            --manifest registry-validation/bundle-manifest.json \
            --attestation-bundle registry-attestation/attestation.jsonl \
            --expect-repository "$EXPECTED_REPOSITORY" \
            --expect-workflow "$EXPECTED_WORKFLOW" \
            --expect-ref "$EXPECTED_REF" \
            --expect-head-sha "$EXPECTED_HEAD_SHA" \
            --json \
            --report-file registry-attestation/attestation-verification.json \
            | tee registry-attestation-verification-stdout.json
          cmp \
            registry-attestation/attestation-verification.json \
            registry-attestation-verification-stdout.json
          rm registry-attestation-verification-stdout.json

      - name: Write registry validation summary
        if: always()
        env:
          ATTESTATION_ID: ${{ steps.attest.outputs.attestation-id }}
          ATTESTATION_URL: ${{ steps.attest.outputs.attestation-url }}
          ATTESTATION_OUTCOME: ${{ steps.attest.outcome }}
          ATTESTATION_VERIFY_OUTCOME: ${{ steps.verify_attestation.outcome }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_WORKFLOW: ${{ github.repository }}/.github/workflows/registry-validation.yml
          SOURCE_REF: ${{ github.ref }}
          SOURCE_DIGEST: ${{ github.sha }}
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { appendFileSync, existsSync, readFileSync } from 'node:fs';
          const reportPath = 'registry-validation/registry-provenance.json';
          const manifestPath = 'registry-validation/bundle-manifest.json';
          let markdown = '## Registry Validation\n\n';
          try {
            const report = JSON.parse(readFileSync(reportPath, 'utf8'));
            const manifestBytes = readFileSync(manifestPath);
            const manifest = JSON.parse(manifestBytes);
            const manifestSha256 = createHash('sha256').update(manifestBytes).digest('hex');
            const verification = existsSync('registry-verification.json')
              ? JSON.parse(readFileSync('registry-verification.json', 'utf8'))
              : { status: 'not-run' };
            const onlineAttestation = existsSync('registry-attestation-online.json')
              ? JSON.parse(readFileSync('registry-attestation-online.json', 'utf8'))
              : [];
            const offlineAttestation = existsSync('registry-attestation/attestation-verification.json')
              ? JSON.parse(readFileSync('registry-attestation/attestation-verification.json', 'utf8'))
              : { status: 'not-run', subjectSha256: null };
            const trustedRootSha256 = existsSync('registry-attestation/trusted-root.jsonl')
              ? createHash('sha256')
                  .update(readFileSync('registry-attestation/trusted-root.jsonl'))
                  .digest('hex')
              : null;
            markdown += `- Status: **${report.status}**\n`;
            markdown += `- Package: \`${report.package}@${report.resolvedVersion}\`\n`;
            markdown += `- Requested version: \`${report.requestedVersion}\`\n`;
            markdown += `- Expected tag: \`${report.expectedTag}\` → \`${report.tagVersion}\`\n`;
            markdown += `- Published at: \`${report.publishedAt}\`\n`;
            markdown += `- Integrity: \`${report.integrity}\`\n`;
            markdown += `- Shasum: \`${report.shasum}\`\n`;
            markdown += `- Package shape: ${report.fileCount} files, ${report.packageSize} packed bytes, ${report.unpackedSize} unpacked bytes\n`;
            markdown += `- README status: \`${report.readmeStatus}\`\n`;
            markdown += `- Consumer install/typecheck: \`${report.registryInstallSmoke}\`\n`;
            markdown += `- Report SHA-256: \`${manifest.reportSha256}\`\n`;
            markdown += `- Stdout SHA-256: \`${manifest.stdoutSha256}\`\n`;
            markdown += `- Bundle manifest SHA-256: \`${manifestSha256}\`\n`;
            markdown += `- Bundled tarball: \`${manifest.tarballFile}\`\n`;
            markdown += `- Bundled tarball integrity: \`${manifest.tarballIntegrity}\`\n`;
            markdown += `- Bundled tarball shasum: \`${manifest.tarballShasum}\`\n`;
            markdown += `- Offline bundle verification: \`${verification.status}\`\n`;
            markdown += `- Manifest attestation: \`${process.env.ATTESTATION_OUTCOME}\`\n`;
            markdown += `- Attestation ID: \`${process.env.ATTESTATION_ID || 'not-created'}\`\n`;
            markdown += `- Attestation URL: ${process.env.ATTESTATION_URL || 'not-created'}\n`;
            markdown += `- Attestation subject SHA-256: \`${offlineAttestation.subjectSha256 || manifestSha256}\`\n`;
            markdown += `- Attestation repository: \`${process.env.SOURCE_REPOSITORY}\`\n`;
            markdown += `- Attestation signer workflow: \`${process.env.SOURCE_WORKFLOW}\`\n`;
            markdown += `- Attestation source ref: \`${process.env.SOURCE_REF}\`\n`;
            markdown += `- Attestation source digest: \`${process.env.SOURCE_DIGEST}\`\n`;
            markdown += `- Online attestation verification: \`${onlineAttestation.length > 0 ? 'passed' : 'not-run'}\`\n`;
            markdown += `- Downloaded-bundle offline attestation verification: \`${offlineAttestation.status}\`\n`;
            markdown += `- Trusted root SHA-256: \`${trustedRootSha256 || 'not-downloaded'}\`\n`;
            markdown += `- Attestation verification step: \`${process.env.ATTESTATION_VERIFY_OUTCOME}\`\n`;
            if (report.error) markdown += `- Error: ${report.error}\n`;
          } catch (error) {
            markdown += `- Status: **failed before a report could be read**\n- Error: ${error.message}\n`;
          }
          appendFileSync(process.env.GITHUB_STEP_SUMMARY, markdown, 'utf8');
          NODE

      - name: Upload registry provenance artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: registry-provenance-${{ inputs.version }}
          path: registry-validation
          if-no-files-found: error

      - name: Upload registry provenance attestation artifact
        if: always() && steps.attest.outcome == 'success'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: registry-provenance-attestation-${{ inputs.version }}
          path: registry-attestation
          if-no-files-found: error

      - name: Enforce registry validation result
        if: >-
          steps.validate.outcome != 'success' ||
          steps.attest.outcome != 'success' ||
          steps.verify_attestation.outcome != 'success'
        run: exit 1
