name: iOS Validation

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-app-smoke:
    name: iOS host-app smoke
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup pnpm
        shell: bash
        env:
          PNPM_VERSION: "11.8.0"
        run: |
          npm install --global --ignore-scripts --prefix "$RUNNER_TEMP/pnpm" "pnpm@$PNPM_VERSION"
          echo "$RUNNER_TEMP/pnpm/bin" >> "$GITHUB_PATH"
          test "$("$RUNNER_TEMP/pnpm/bin/pnpm" --version)" = "$PNPM_VERSION"

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit iOS PASS replay fixture
        run: pnpm fixtures:ios-pass-replay:audit -- --json

      - name: Run iOS host-app smoke
        shell: bash
        run: |
          mkdir -p ios-smoke-diagnostics
          set -o pipefail
          pnpm example:ios:smoke 2>&1 | tee ios-smoke-diagnostics/ios-smoke.log

      - name: Summarize iOS smoke diagnostics
        if: failure()
        run: |
          node scripts/ios-validation.mjs summarize-smoke-log ios-smoke-diagnostics/ios-smoke.log \
            | tee ios-smoke-diagnostics/ios-smoke-summary.md

      - name: Upload iOS smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ios-smoke-diagnostics
          path: ios-smoke-diagnostics
          if-no-files-found: ignore
