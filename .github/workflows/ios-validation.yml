name: iOS Validation

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-app-smoke:
    name: iOS host-app smoke
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit iOS PASS replay fixture
        run: pnpm fixtures:ios-pass-replay:audit -- --json

      - name: Run iOS host-app smoke
        shell: bash
        run: |
          mkdir -p ios-smoke-diagnostics
          set -o pipefail
          pnpm example:ios:smoke 2>&1 | tee ios-smoke-diagnostics/ios-smoke.log

      - name: Summarize iOS smoke diagnostics
        if: failure()
        run: |
          node scripts/ios-validation.mjs summarize-smoke-log ios-smoke-diagnostics/ios-smoke.log \
            | tee ios-smoke-diagnostics/ios-smoke-summary.md

      - name: Upload iOS smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ios-smoke-diagnostics
          path: ios-smoke-diagnostics
          if-no-files-found: ignore
