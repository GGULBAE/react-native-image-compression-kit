name: Action Pin Review

on:
  workflow_dispatch:
    inputs:
      action:
        description: Locked Action path to review
        required: true
        default: actions/checkout
        type: string
      repository:
        description: Source repository that must own the Action
        required: true
        default: actions/checkout
        type: string
      release_tag:
        description: Reviewed release tag comment
        required: true
        default: v7
        type: string
      proposed_sha:
        description: Proposed full commit SHA already present in the candidate lock
        required: true
        default: 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        type: string
      baseline_ref:
        description: Trusted base ref used to reject repository changes and major downgrades
        required: true
        default: master
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  action-pin-review:
    name: Resolve and review Action pin
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Checkout baseline lock
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ inputs.baseline_ref }}
          path: action-pin-baseline
          sparse-checkout: .github/actions-lock.json
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify candidate workflow lock
        run: pnpm verify:workflow-supply-chain -- --json

      - name: Resolve tag and build canonical provenance artifact
        id: review
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_ACTION: ${{ inputs.action }}
          REVIEW_REPOSITORY: ${{ inputs.repository }}
          REVIEW_RELEASE_TAG: ${{ inputs.release_tag }}
          REVIEW_PROPOSED_SHA: ${{ inputs.proposed_sha }}
          REVIEW_BASELINE_REF: ${{ inputs.baseline_ref }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_REF: ${{ github.ref }}
          SOURCE_HEAD_SHA: ${{ github.sha }}
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_PATH: .github/workflows/action-pin-review.yml
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PATH: ${{ github.event_path }}
        shell: bash
        run: |
          rm -rf action-pin-review action-pin-review-stdout.json action-pin-review-replay.json
          pnpm review:action-pin -- \
            --action "$REVIEW_ACTION" \
            --repository "$REVIEW_REPOSITORY" \
            --release-tag "$REVIEW_RELEASE_TAG" \
            --proposed-sha "$REVIEW_PROPOSED_SHA" \
            --baseline-ref "$REVIEW_BASELINE_REF" \
            --baseline-lock action-pin-baseline/.github/actions-lock.json \
            --candidate-lock .github/actions-lock.json \
            --source-repository "$SOURCE_REPOSITORY" \
            --source-ref "$SOURCE_REF" \
            --source-head-sha "$SOURCE_HEAD_SHA" \
            --workflow-name "$WORKFLOW_NAME" \
            --workflow-path "$WORKFLOW_PATH" \
            --workflow-ref "$WORKFLOW_REF" \
            --workflow-sha "$WORKFLOW_SHA" \
            --workflow-file "$WORKFLOW_PATH" \
            --run-id "$RUN_ID" \
            --run-attempt "$RUN_ATTEMPT" \
            --event-name "$EVENT_NAME" \
            --github-event "$EVENT_PATH" \
            --artifact-dir action-pin-review \
            --json \
            | tee action-pin-review-stdout.json
          cmp action-pin-review/action-pin-provenance.json action-pin-review-stdout.json
          pnpm verify:action-pin-provenance -- \
            --artifact-dir action-pin-review \
            --json \
            | tee action-pin-review-replay.json
          cmp action-pin-review/action-pin-provenance.json action-pin-review-replay.json
          rm action-pin-review-stdout.json action-pin-review-replay.json

      - name: Attest canonical Action pin artifact manifest
        id: attest
        if: steps.review.outcome == 'success'
        continue-on-error: true
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: action-pin-review/artifact-manifest.json

      - name: Verify and package Action pin attestation trust material
        id: verify_attestation
        if: steps.review.outcome == 'success' && steps.attest.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
          EXPECTED_WORKFLOW: ${{ github.repository }}/.github/workflows/action-pin-review.yml
          EXPECTED_REF: ${{ github.ref }}
          EXPECTED_HEAD_SHA: ${{ github.sha }}
        run: |
          rm -rf action-pin-attestation action-pin-attestation-download
          rm -f action-pin-attestation-online.json action-pin-attestation-verification-stdout.json
          mkdir -p action-pin-attestation action-pin-attestation-download

          policy=(
            --repo "$EXPECTED_REPOSITORY"
            --signer-workflow "$EXPECTED_WORKFLOW"
            --source-ref "$EXPECTED_REF"
            --source-digest "$EXPECTED_HEAD_SHA"
            --cert-oidc-issuer https://token.actions.githubusercontent.com
            --predicate-type https://slsa.dev/provenance/v1
            --deny-self-hosted-runners
          )
          gh attestation verify \
            action-pin-review/artifact-manifest.json \
            "${policy[@]}" \
            --format json \
            > action-pin-attestation-online.json

          (
            cd action-pin-attestation-download
            gh attestation download \
              ../action-pin-review/artifact-manifest.json \
              --repo "$EXPECTED_REPOSITORY"
          )
          mapfile -t downloaded_bundles < <(
            find action-pin-attestation-download -maxdepth 1 -type f -name 'sha256*.jsonl' -print
          )
          if [[ "${#downloaded_bundles[@]}" -ne 1 ]]; then
            echo "Expected exactly one downloaded attestation JSONL, found ${#downloaded_bundles[@]}." >&2
            exit 1
          fi
          mv "${downloaded_bundles[0]}" action-pin-attestation/attestation.jsonl

          gh attestation trusted-root > action-pin-attestation/trusted-root.jsonl
          trusted_root_sha256=$(sha256sum action-pin-attestation/trusted-root.jsonl | cut -d ' ' -f 1)
          if [[ "$trusted_root_sha256" != "65ca537f6ed8a47fd0e560c421baa1f6c1efb8b25fc200d8c5c02c0e92eb2b9c" ]]; then
            echo "Unexpected GitHub trusted root SHA-256: $trusted_root_sha256" >&2
            exit 1
          fi

          pnpm verify:action-pin-attestation -- \
            --artifact-dir action-pin-review \
            --attestation-bundle action-pin-attestation/attestation.jsonl \
            --trusted-root action-pin-attestation/trusted-root.jsonl \
            --json \
            --report-file action-pin-attestation/attestation-verification.json \
            | tee action-pin-attestation-verification-stdout.json
          cmp \
            action-pin-attestation/attestation-verification.json \
            action-pin-attestation-verification-stdout.json
          rm action-pin-attestation-verification-stdout.json

      - name: Write Action pin review summary
        if: always()
        env:
          ATTESTATION_ID: ${{ steps.attest.outputs.attestation-id }}
          ATTESTATION_URL: ${{ steps.attest.outputs.attestation-url }}
          ATTESTATION_OUTCOME: ${{ steps.attest.outcome }}
          ATTESTATION_VERIFY_OUTCOME: ${{ steps.verify_attestation.outcome }}
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { appendFileSync, existsSync, readFileSync } from 'node:fs';
          const reportPath = 'action-pin-review/action-pin-provenance.json';
          let markdown = '## Action Pin Review\n\n';
          if (existsSync(reportPath)) {
            const report = JSON.parse(readFileSync(reportPath, 'utf8'));
            markdown += `- Status: **${report.status}**\n`;
            markdown += `- Action: \`${report.action}\`\n`;
            markdown += `- Repository: \`${report.repository}\`\n`;
            markdown += `- Release tag: \`${report.releaseTag}\`\n`;
            markdown += `- Proposed SHA: \`${report.proposedSha}\`\n`;
            markdown += `- Baseline: \`${report.baselineVersion}@${report.baselineSha}\`\n`;
            markdown += `- Candidate: \`${report.candidateVersion}@${report.candidateSha}\`\n`;
            markdown += `- Resolution: \`${report.resolution}\`\n`;
            markdown += `- Tag object: \`${report.tagObjectType}@${report.tagObjectSha}\`\n`;
            markdown += `- Resolved commit: \`${report.resolvedCommitSha}\`\n`;
            markdown += `- Source repository: \`${report.sourceRepository}\`\n`;
            markdown += `- Source ref: \`${report.sourceRef}\`\n`;
            markdown += `- Source head SHA: \`${report.sourceHeadSha}\`\n`;
            markdown += `- Workflow: \`${report.workflowName}\` (\`${report.workflowPath}\`)\n`;
            markdown += `- Workflow ref: \`${report.workflowRef}\`\n`;
            markdown += `- Workflow SHA: \`${report.workflowSha}\`\n`;
            markdown += `- Run: \`${report.runId}\` attempt \`${report.runAttempt}\`\n`;
            markdown += `- Candidate lock SHA-256: \`${report.evidence.candidateLockSha256}\`\n`;
            markdown += `- Workflow definition SHA-256: \`${report.evidence.workflowSha256}\`\n`;
            markdown += `- Artifact manifest SHA-256: \`${report.evidence.artifactManifestSha256}\`\n`;
            const offlineAttestation = existsSync('action-pin-attestation/attestation-verification.json')
              ? JSON.parse(readFileSync('action-pin-attestation/attestation-verification.json', 'utf8'))
              : { status: 'not-run' };
            const trustedRootSha256 = existsSync('action-pin-attestation/trusted-root.jsonl')
              ? createHash('sha256').update(readFileSync('action-pin-attestation/trusted-root.jsonl')).digest('hex')
              : null;
            markdown += `- Manifest attestation: \`${process.env.ATTESTATION_OUTCOME}\`\n`;
            markdown += `- Attestation ID: \`${process.env.ATTESTATION_ID || 'not-created'}\`\n`;
            markdown += `- Attestation URL: ${process.env.ATTESTATION_URL || 'not-created'}\n`;
            markdown += `- Offline attestation verification: \`${offlineAttestation.status}\`\n`;
            markdown += `- Attestation signer workflow: \`${offlineAttestation.signerWorkflow || 'not-verified'}\`\n`;
            markdown += `- Attestation source ref: \`${offlineAttestation.sourceRef || 'not-verified'}\`\n`;
            markdown += `- Attestation source digest: \`${offlineAttestation.sourceHeadSha || 'not-verified'}\`\n`;
            markdown += `- Attestation workflow digest: \`${offlineAttestation.workflowSha || 'not-verified'}\`\n`;
            markdown += `- Trusted root SHA-256: \`${trustedRootSha256 || 'not-downloaded'}\`\n`;
            markdown += `- Attestation verification step: \`${process.env.ATTESTATION_VERIFY_OUTCOME}\`\n`;
            if (report.error) markdown += `- Error: ${report.error}\n`;
          } else {
            markdown += '- Status: **failed before a canonical report was created**\n';
          }
          appendFileSync(process.env.GITHUB_STEP_SUMMARY, markdown, 'utf8');
          NODE

      - name: Upload Action pin provenance artifact
        if: always() && hashFiles('action-pin-review/action-pin-provenance.json') != ''
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: action-pin-review-${{ github.run_id }}
          path: action-pin-review
          if-no-files-found: error

      - name: Upload Action pin attestation artifact
        if: always() && steps.attest.outcome == 'success'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: action-pin-attestation-${{ github.run_id }}
          path: action-pin-attestation
          if-no-files-found: error

      - name: Enforce Action pin review result
        if: >-
          steps.review.outcome != 'success' ||
          steps.attest.outcome != 'success' ||
          steps.verify_attestation.outcome != 'success'
        run: exit 1
